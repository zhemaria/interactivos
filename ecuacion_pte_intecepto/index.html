<!DOCTYPE html>
<html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&amp;display=swap" rel="stylesheet">
    <title>Función Lineal Centrada</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;

            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Lato', sans-serif;
        }
        canvas {
            width: 400px !important;
            height: 400px !important;        }
            input[type="number"] {
            width: 50px;  /* Ancho más estrecho para los inputs */
            height: 20px; /* Altura reducida para los inputs */
            font-size: 14px; /* Ajustar el tamaño de la fuente para que se adapte al nuevo tamaño */
            text-align: center; /* Centrar el texto dentro de los inputs */
            margin: 5px; /* Agregar un pequeño margen alrededor de los inputs */
        }
        label {
            font-size: 16px; /* Ajustar el tamaño de la fuente de las etiquetas para claridad */
        }
    </style>
</head><body><h1>Función Lineal</h1>
<p style="width: 700px; text-align: center;"><span style="font-size: 19px;">Modifique los valores (-10 a 10) de la pendiente y el intercepto. </span><br><span style="font-size: 19px;">Observe los puntos, la inclinación y la ecuacion de la línea recta</span></p>
<div><label for="slope">Pendiente (m): </label> <input type="number" id="slope" value="1" step="1" onchange="updateChart()"><br><br><label for="intercept">Intercepto (b): </label> <input type="number" id="intercept" value="1" step="1" onchange="updateChart()"></div>
<p style="font-size: xx-large;">Ecuación: <em><span style="color: blue;" id="equation">y = x + 0</span></em></p>
<p><canvas id="myChart"></canvas> <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateChart(); // Create the initial graph
        });

        function updateChart() {
            var slope = document.getElementById('slope').value;
            var intercept = document.getElementById('intercept').value;
            document.getElementById('equation').textContent = `y = ${{slope}}x + ${{intercept}}`;

            var ctx = document.getElementById('myChart').getContext('2d');
            var xValues = Array.from({length: 21}, (_, i) => i - 10);
            var yValues = xValues.map(x => slope * x + parseFloat(intercept));

            if (window.bar != undefined) 
                window.bar.destroy();
            window.bar = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: xValues,
                    datasets: [{
                        label: 'Función Lineal',
                        data: yValues,
                        borderColor: 'blue',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'linear',
                            position: 'center',
                            min: -10,
                            max: 10,
                            grid: {
                                display: false  // Oculta la cuadrícula del eje x
                            },
                            ticks: {
                                color: 'black',  // Color de las etiquetas del eje x
                                z: 1
                            }
                        },
                        y: {
                            beginAtZero: true,
                            min: -10,
                            max: 10,
                            position: 'center',  // Centra el eje y
                            grid: {
                                drawOnChartArea: false, // Oculta las líneas de la cuadrícula del eje y
                                color: 'black' // Color de las líneas del eje y
                            },
                            ticks: {
                                color: 'black', // Color de las etiquetas del eje y
                                z: 1,
                                crossAlign: 'center' // Centra los ticks en el eje y
                            }
                        }
                    }
                }
            });
        }
    </script></p></body></html>
