<p><script>
  // Constantes y variables globales
  const canvas = document.getElementById('lienzo');
  const ctx = canvas.getContext('2d');
  let escenarioActual = null;
  let datosActuales = {};
  // Iniciar sin mostrar el triángulo resaltado
  let mostrarTriangulo = false;
  
  // Función para alternar entre mostrar o no el triángulo con colores
  function alternarTriangulo() {
      mostrarTriangulo = !mostrarTriangulo;
      if (escenarioActual && datosActuales) {
          escenarioActual.dibujar(datosActuales);
          mostrarDatos(datosActuales);
      }
  }
  
  // Configurar canvas para alta resolución
  function setupCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
  }

  // Generador de números aleatorios
  function aleatorio(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
  }
  
  // Redondear a un decimal
  function redondear(numero) {
      return Math.round(numero * 10) / 10;
  }

  // Colores para resaltar el triángulo
  const colores = {
      cateto1: '#e74c3c', // Rojo
      cateto2: '#3498db', // Azul
      hipotenusa: '#2ecc71', // Verde
      fondo: '#f5f5f5',
      elementos: '#34495e' // Color principal para los elementos cuando no se muestra el triángulo
  };

  // Definición de tipos de escenarios
  const tiposEscenarios = [
      {
          nombre: "Escalera apoyada en pared",
          dibujar: dibujarEscaleraPared,
          datos: generarDatosEscaleraPared,
          calcular: calcularEscaleraPared,
          describir: describirEscaleraPared
      },
      {
          nombre: "Barco cruzando río",
          dibujar: dibujarBarcoRio,
          datos: generarDatosBarcoRio,
          calcular: calcularBarcoRio,
          describir: describirBarcoRio
      },
      {
          nombre: "Torre con cable tensor",
          dibujar: dibujarTorreCable,
          datos: generarDatosTorreCable,
          calcular: calcularTorreCable,
          describir: describirTorreCable
      },
      {
          nombre: "Rampa de acceso",
          dibujar: dibujarRampa,
          datos: generarDatosRampa,
          calcular: calcularRampa,
          describir: describirRampa
      },
      {
          nombre: "Techo de casa",
          dibujar: dibujarTechoCasa,
          datos: generarDatosTechoCasa,
          calcular: calcularTechoCasa,
          describir: describirTechoCasa
      }
  ];

  // ==============================================
  // Funciones para cada tipo de escenario
  // ==============================================
  
  // 1. Escalera apoyada en pared
  function generarDatosEscaleraPared() {
      // Decidir qué valor calcular: altura, distancia base o longitud escalera
      const tipoProblema = aleatorio(0, 2);
      
      let altura, distanciaBase, longitudEscalera;
      
      // Generar dimensiones razonables
      if (tipoProblema === 0) { // Calcular altura
          distanciaBase = aleatorio(30, 100) / 10; // 3.0 a 10.0 metros
          longitudEscalera = aleatorio(Math.round(distanciaBase * 13), Math.round(distanciaBase * 17)) / 10; // Relación sensata
          altura = Math.sqrt(longitudEscalera * longitudEscalera - distanciaBase * distanciaBase);
          altura = redondear(altura);
      } else if (tipoProblema === 1) { // Calcular distancia base
          altura = aleatorio(30, 100) / 10; // 3.0 a 10.0 metros
          longitudEscalera = aleatorio(Math.round(altura * 13), Math.round(altura * 17)) / 10; // Relación sensata
          distanciaBase = Math.sqrt(longitudEscalera * longitudEscalera - altura * altura);
          distanciaBase = redondear(distanciaBase);
      } else { // Calcular longitud escalera
          altura = aleatorio(30, 100) / 10; // 3.0 a 10.0 metros
          distanciaBase = aleatorio(30, 100) / 10; // 3.0 a 10.0 metros
          longitudEscalera = Math.sqrt(altura * altura + distanciaBase * distanciaBase);
          longitudEscalera = redondear(longitudEscalera);
      }
      
      return {
          tipo: "Escalera apoyada en pared",
          tipoProblema: tipoProblema, // 0: altura, 1: distancia base, 2: longitud escalera
          altura: altura,
          distanciaBase: distanciaBase,
          longitudEscalera: longitudEscalera,
          offsetX: 0,
          offsetY: 0
      };
  }
  
  function dibujarEscaleraPared(datos) {
      const { offsetX, offsetY } = calcularOffset(datos);
      datos.offsetX = offsetX;
      datos.offsetY = offsetY;
      
      const anchoCanvas = canvas.width;
      const altoCanvas = canvas.height;
      
      // Escalamos los valores para que quepan bien en el canvas
      const escala = Math.min(anchoCanvas / 450, altoCanvas / 350);
      
      // Posición de la esquina inferior izquierda de la pared (origen del sistema)
      const origenX = offsetX + 100;
      const origenY = offsetY + 250;
      
      // Altura escalada
      const alturaEscalada = datos.altura * 20 * escala;
      // Distancia base escalada
      const distanciaBaseEscalada = datos.distanciaBase * 20 * escala;
      
      ctx.clearRect(0, 0, anchoCanvas, altoCanvas);
      
      // Dibujar suelo
      ctx.strokeStyle = colores.elementos;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(origenX - 50, origenY);
      ctx.lineTo(origenX + 250, origenY);
      ctx.stroke();
      
      // Dibujar pared
      ctx.beginPath();
      ctx.moveTo(origenX, origenY);
      ctx.lineTo(origenX, origenY - 200);
      ctx.stroke();
      
      // Dibujar escalera
      if (mostrarTriangulo) {
          // Cateto 1 (altura)
          ctx.strokeStyle = colores.cateto1;
          ctx.beginPath();
          ctx.moveTo(origenX, origenY);
          ctx.lineTo(origenX, origenY - alturaEscalada);
          ctx.stroke();
          
          // Cateto 2 (distancia base)
          ctx.strokeStyle = colores.cateto2;
          ctx.beginPath();
          ctx.moveTo(origenX, origenY);
          ctx.lineTo(origenX + distanciaBaseEscalada, origenY);
          ctx.stroke();
          
          // Hipotenusa (escalera)
          ctx.strokeStyle = colores.hipotenusa;
          ctx.lineWidth = 3;
      } else {
          ctx.strokeStyle = colores.elementos;
          ctx.lineWidth = 3;
      }
      
      ctx.beginPath();
      ctx.moveTo(origenX, origenY - alturaEscalada);
      ctx.lineTo(origenX + distanciaBaseEscalada, origenY);
      ctx.stroke();
      
      // Añadir los peldaños de la escalera
      const numPeldanos = 8;
      const longitudEscalera = Math.sqrt(alturaEscalada * alturaEscalada + distanciaBaseEscalada * distanciaBaseEscalada);
      const peldanoEspaciado = longitudEscalera / (numPeldanos + 1);
      const angulo = Math.atan2(alturaEscalada, distanciaBaseEscalada);
      
      ctx.strokeStyle = colores.elementos;
      ctx.lineWidth = 1;
      
      for (let i = 1; i <= numPeldanos; i++) {
          const distancia = i * peldanoEspaciado;
          const x1 = origenX + distanciaBaseEscalada - (distancia * Math.cos(angulo));
          const y1 = origenY - (distancia * Math.sin(angulo));
          
          const x2 = x1 + 10 * Math.sin(angulo);
          const y2 = y1 + 10 * Math.cos(angulo);
          
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
      }
      
      // Dibujar punto de apoyo en la pared
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.arc(origenX, origenY - alturaEscalada, 3, 0, 2 * Math.PI);
      ctx.fill();
      
      // Dibujar punto de apoyo en el suelo
      ctx.fillStyle = '#3498db';
      ctx.beginPath();
      ctx.arc(origenX + distanciaBaseEscalada, origenY, 3, 0, 2 * Math.PI);
      ctx.fill();
  }
  
  function calcularEscaleraPared(datos) {
      let explicacion = [];
      let valorCalculado = 0;
      
      // Teorema de Pitágoras: a² + b² = c²
      if (datos.tipoProblema === 0) { // Calcular altura
          valorCalculado = datos.altura;
          
          explicacion = [
              {
                  texto: "Paso 1: Identificamos los valores conocidos.",
                  formula: "",
                  calculo: `Longitud de la escalera (hipotenusa) = ${datos.longitudEscalera} m`
                      + `<br>Distancia de la base de la escalera a la pared (cateto) = ${datos.distanciaBase} m`
              },
              {
                  texto: "Paso 2: Aplicamos el teorema de Pitágoras para calcular la altura.",
                  formula: "altura² = longitud escalera² - distancia base²",
                  calculo: `altura² = ${datos.longitudEscalera}² - ${datos.distanciaBase}²`
                      + `<br>altura² = ${(datos.longitudEscalera * datos.longitudEscalera).toFixed(1)} - ${(datos.distanciaBase * datos.distanciaBase).toFixed(1)}`
                      + `<br>altura² = ${(datos.longitudEscalera * datos.longitudEscalera - datos.distanciaBase * datos.distanciaBase).toFixed(1)}`
              },
              {
                  texto: "Paso 3: Calculamos la raíz cuadrada para obtener la altura.",
                  formula: "altura = √(longitud escalera² - distancia base²)",
                  calculo: `altura = √${(datos.longitudEscalera * datos.longitudEscalera - datos.distanciaBase * datos.distanciaBase).toFixed(1)}`
                      + `<br>altura = ${{valorCalculado}} m`
              }
          ];
          
      } else if (datos.tipoProblema === 1) { // Calcular distancia base
          valorCalculado = datos.distanciaBase;
          
          explicacion = [
              {
                  texto: "Paso 1: Identificamos los valores conocidos.",
                  formula: "",
                  calculo: `Longitud de la escalera (hipotenusa) = ${datos.longitudEscalera} m`
                      + `<br>Altura a la que llega la escalera (cateto) = ${datos.altura} m`
              },
              {
                  texto: "Paso 2: Aplicamos el teorema de Pitágoras para calcular la distancia base.",
                  formula: "distancia base² = longitud escalera² - altura²",
                  calculo: `distancia base² = ${datos.longitudEscalera}² - ${datos.altura}²`
                      + `<br>distancia base² = ${(datos.longitudEscalera * datos.longitudEscalera).toFixed(1)} - ${(datos.altura * datos.altura).toFixed(1)}`
                      + `<br>distancia base² = ${(datos.longitudEscalera * datos.longitudEscalera - datos.altura * datos.altura).toFixed(1)}`
              },
              {
                  texto: "Paso 3: Calculamos la raíz cuadrada para obtener la distancia base.",
                  formula: "distancia base = √(longitud escalera² - altura²)",
                  calculo: `distancia base = √${(datos.longitudEscalera * datos.longitudEscalera - datos.altura * datos.altura).toFixed(1)}`
                      + `<br>distancia base = ${{valorCalculado}} m`
              }
          ];
          
      } else { // Calcular longitud escalera
          valorCalculado = datos.longitudEscalera;
          
          explicacion = [
              {
                  texto: "Paso 1: Identificamos los valores conocidos.",
                  formula: "",
                  calculo: `Altura a la que llega la escalera (cateto) = ${datos.altura} m`
                      + `<br>Distancia de la base de la escalera a la pared (cateto) = ${datos.distanciaBase} m`
              },
              {
                  texto: "Paso 2: Aplicamos el teorema de Pitágoras para calcular la longitud de la escalera.",
                  formula: "longitud escalera² = altura² + distancia base²",
                  calculo: `longitud escalera² = ${datos.altura}² + ${datos.distanciaBase}²`
                      + `<br>longitud escalera² = ${(datos.altura * datos.altura).toFixed(1)} + ${(datos.distanciaBase * datos.distanciaBase).toFixed(1)}`
                      + `<br>longitud escalera² = ${(datos.altura * datos.altura + datos.distanciaBase * datos.distanciaBase).toFixed(1)}`
              },
              {
                  texto: "Paso 3: Calculamos la raíz cuadrada para obtener la longitud de la escalera.",
                  formula: "longitud escalera = √(altura² + distancia base²)",
                  calculo: `longitud escalera = √${(datos.altura * datos.altura + datos.distanciaBase * datos.distanciaBase).toFixed(1)}`
                      + `<br>longitud escalera = ${{valorCalculado}} m`
              }
          ];
      }
      
      return {
          explicacion: explicacion,
          valorCalculado: valorCalculado
      };
  }
  
  function describirEscaleraPared(datos) {
      let enunciado = "";
      let datosProblema = "";
      
      if (datos.tipoProblema === 0) { // Calcular altura
          enunciado = "Una escalera está apoyada contra una pared. Calcula la altura a la que llega la escalera en la pared.";
          datosProblema = `
              <p>Longitud de la escalera: ${datos.longitudEscalera} m</p>
              <p>Distancia de la base de la escalera a la pared: ${datos.distanciaBase} m</p>
              <p>Altura: ? m</p>
          `;
      } else if (datos.tipoProblema === 1) { // Calcular distancia base
          enunciado = "Una escalera está apoyada contra una pared. Calcula a qué distancia de la pared está apoyada la base de la escalera.";
          datosProblema = `
              <p>Longitud de la escalera: ${datos.longitudEscalera} m</p>
              <p>Altura a la que llega la escalera: ${datos.altura} m</p>
              <p>Distancia de la base a la pared: ? m</p>
          `;
      } else { // Calcular longitud escalera
          enunciado = "Una escalera está apoyada contra una pared. Calcula la longitud de la escalera.";
          datosProblema = `
              <p>Altura a la que llega la escalera: ${datos.altura} m</p>
              <p>Distancia de la base de la escalera a la pared: ${datos.distanciaBase} m</p>
              <p>Longitud de la escalera: ? m</p>
          `;
      }
      
      return {
          enunciado: enunciado,
          datos: datosProblema
      };
  }
  
  // 2. Barco cruzando río
  function generarDatosBarcoRio() {
      // Decidir qué valor calcular: ancho del río, desplazamiento corriente o distancia diagonal
      const tipoProblema = aleatorio(0, 2);
      
      let anchoRio, desplazamientoCorriente, distanciaDiagonal;
      
      // Generar dimensiones razonables
      if (tipoProblema === 0) { // Calcular ancho del río
          desplazamientoCorriente = aleatorio(50, 150) / 10; // 5.0 a 15.0 metros
          distanciaDiagonal = aleatorio(Math.round(desplazamientoCorriente * 12), Math.round(desplazamientoCorriente * 18)) / 10;
          anchoRio = Math.sqrt(distanciaDiagonal * distanciaDiagonal - desplazamientoCorriente * desplazamientoCorriente);
          anchoRio = redondear(anchoRio);
      } else if (tipoProblema === 1) { // Calcular desplazamiento por corriente
          anchoRio = aleatorio(80, 200) / 10; // 8.0 a 20.0 metros
          distanciaDiagonal = aleatorio(Math.round(anchoRio * 12), Math.round(anchoRio * 15)) / 10;
          desplazamientoCorriente = Math.sqrt(distanciaDiagonal * distanciaDiagonal - anchoRio * anchoRio);
          desplazamientoCorriente = redondear(desplazamientoCorriente);
      } else { // Calcular distancia diagonal recorrida
          anchoRio = aleatorio(80, 200) / 10; // 8.0 a 20.0 metros
          desplazamientoCorriente = aleatorio(50, 150) / 10; // 5.0 a 15.0 metros
          distanciaDiagonal = Math.sqrt(anchoRio * anchoRio + desplazamientoCorriente * desplazamientoCorriente);
          distanciaDiagonal = redondear(distanciaDiagonal);
      }
      
      return {
          tipo: "Barco cruzando río",
          tipoProblema: tipoProblema, // 0: ancho río, 1: desplazamiento corriente, 2: distancia diagonal
          anchoRio: anchoRio,
          desplazamientoCorriente: desplazamientoCorriente,
          distanciaDiagonal: distanciaDiagonal,
          offsetX: 0,
          offsetY: 0
      };
  }
  
  function dibujarBarcoRio(datos) {
      const { offsetX, offsetY } = calcularOffset(datos);
      datos.offsetX = offsetX;
      datos.offsetY = offsetY;
      
      const anchoCanvas = canvas.width;
      const altoCanvas = canvas.height;
      
      // Escalamos los valores para que quepan bien en el canvas
      const escala = Math.min(anchoCanvas / 450, altoCanvas / 350);
      
      // Posición de la orilla inicial del río (origen del sistema)
      const origenX = offsetX + 100;
      const origenY = offsetY + 150;
      
      // Dimensiones escaladas
      const anchoRioEscalado = datos.anchoRio * 10 * escala;
      const desplazamientoEscalado = datos.desplazamientoCorriente * 10 * escala;
      
      ctx.clearRect(0, 0, anchoCanvas, altoCanvas);
      
      // Dibujar río
      ctx.fillStyle = '#3498db'; // Azul claro
      ctx.fillRect(origenX, origenY - 50, 250, 150);
      
      // Dibujar orillas
      ctx.fillStyle = '#2ecc71'; // Verde
      ctx.fillRect(origenX - 50, origenY - 50, 50, 150);
      ctx.fillRect(origenX + 250, origenY - 50, 50, 150);
      
      // Dibujar líneas de trayecto
      if (mostrarTriangulo) {
          // Cateto 1 (ancho río)
          ctx.strokeStyle = colores.cateto1;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(origenX, origenY);
          ctx.lineTo(origenX + anchoRioEscalado, origenY);
          ctx.stroke();
          
          // Cateto 2 (desplazamiento corriente)
          ctx.strokeStyle = colores.cateto2;
          ctx.beginPath();
          ctx.moveTo(origenX + anchoRioEscalado, origenY);
          ctx.lineTo(origenX + anchoRioEscalado, origenY + desplazamientoEscalado);
          ctx.stroke();
          
          // Hipotenusa (trayecto diagonal)
          ctx.strokeStyle = colores.hipotenusa;
          ctx.lineWidth = 2;
          ctx.setLineDash([5, 3]);
          ctx.beginPath();
          ctx.moveTo(origenX, origenY);
          ctx.lineTo(origenX + anchoRioEscalado, origenY + desplazamientoEscalado);
          ctx.stroke();
          ctx.setLineDash([]);
      } else {
          // Solo trayecto diagonal
          ctx.strokeStyle = colores.elementos;
          ctx.lineWidth = 2;
          ctx.setLineDash([5, 3]);
          ctx.beginPath();
          ctx.moveTo(origenX, origenY);
          ctx.lineTo(origenX + anchoRioEscalado, origenY + desplazamientoEscalado);
          ctx.stroke();
          ctx.setLineDash([]);
      }
      
      // Dibujar barco en posición inicial
      dibujarBarco(origenX, origenY, 10);
      
      // Dibujar barco en posición final
      dibujarBarco(origenX + anchoRioEscalado, origenY + desplazamientoEscalado, 10);
      
      // Dibujar flechas indicando la corriente
      const numFlechas = 5;
      const espacioEntreFlechas = 150 / numFlechas;
      
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      
      for (let i = 0; i < numFlechas; i++) {
          const y = origenY - 25 + i * espacioEntreFlechas;
          ctx.beginPath();
          ctx.moveTo(origenX + 50, y);
          ctx.lineTo(origenX + 70, y);
          ctx.lineTo(origenX + 65, y - 5);
          ctx.moveTo(origenX + 70, y);

    function dibujarTorreCable(datos) {
        const { offsetX, offsetY } = calcularOffset(datos);
        datos.offsetX = offsetX;
        datos.offsetY = offsetY;
        
        const anchoCanvas = canvas.width;
        const altoCanvas = canvas.height;
        
        // Escalamos los valores para que quepan bien en el canvas
        const escala = Math.min(anchoCanvas / 450, altoCanvas / 350);
        
        // Posición de la base de la torre (origen del sistema)
        const origenX = offsetX + 180;
        const origenY = offsetY + 250;
        
        // Dimensiones escaladas
        const alturaEscalada = datos.alturaTorre * 10 * escala;
        const distanciaEscalada = datos.distanciaAnclaje * 10 * escala;
        
        ctx.clearRect(0, 0, anchoCanvas, altoCanvas);
        
        // Dibujar suelo
        ctx.strokeStyle = colores.elementos;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(origenX - 150, origenY);
        ctx.lineTo(origenX + 150, origenY);
        ctx.stroke();
        
        // Dibujar torre
        if (mostrarTriangulo) {
            // Cateto 1 (altura torre)
            ctx.strokeStyle = colores.cateto1;
            ctx.lineWidth = 3;
        } else {
            ctx.strokeStyle = colores.elementos;
            ctx.lineWidth = 3;
        }
        ctx.beginPath();
        ctx.moveTo(origenX, origenY);
        ctx.lineTo(origenX, origenY - alturaEscalada);
        ctx.stroke();
        
        // Detalles de la torre (estructura)
        ctx.strokeStyle = colores.elementos;
        ctx.lineWidth = 1;
        
        // Cruz 1
        ctx.beginPath();
        ctx.moveTo(origenX - 10, origenY - alturaEscalada/4);
        ctx.lineTo(origenX + 10, origenY - alturaEscalada/2);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(origenX - 10, origenY - alturaEscalada/2);
        ctx.lineTo(origenX + 10, origenY - alturaEscalada/4);
        ctx.stroke();
        
        // Cruz 2
        ctx.beginPath();
        ctx.moveTo(origenX - 10, origenY - 3*alturaEscalada/4);
        ctx.lineTo(origenX + 10, origenY - alturaEscalada);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(origenX - 10, origenY - alturaEscalada);
        ctx.lineTo(origenX + 10, origenY - 3*alturaEscalada/4);
        ctx.stroke();
        
        // Dibujar anclaje del cable en el suelo
        if (mostrarTriangulo) {
            // Cateto 2 (distancia anclaje)
            ctx.strokeStyle = colores.cateto2;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(origenX, origenY);
            ctx.lineTo(origenX - distanciaEscalada, origenY);
            ctx.stroke();
        }
        
        // Dibujar cable tensor
        if (mostrarTriangulo) {
            // Hipotenusa (cable)
            ctx.strokeStyle = colores.hipotenusa;
            ctx.lineWidth = 2;
        } else {
            ctx.strokeStyle = colores.elementos;
            ctx.lineWidth = 2;
        }
        ctx.beginPath();
        ctx.moveTo(origenX, origenY - alturaEscalada);
        ctx.lineTo(origenX - distanciaEscalada, origenY);
        ctx.stroke();
        
        // Dibujar anclaje en suelo
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.moveTo(origenX - distanciaEscalada, origenY);
        ctx.lineTo(origenX - distanciaEscalada - 5, origenY + 5);
        ctx.lineTo(origenX - distanciaEscalada + 5, origenY + 5);
        ctx.closePath();
        ctx.fill();
    }

            longitudRampa = aleatorio(100, 200) / 10; // 10.0 a 20.0 metros

            longitudRampa = aleatorio(100, 200) / 10; // 10.0 a 20.0 metros
            altura = aleatorio(20, 60) / 10; // 2.0 a 6.0 metros

        ctx.arc(personaX, personaY - 5, 5, 0, 2 * Math.PI);

        ctx.moveTo(personaX - 5, personaY + 2);
        ctx.lineTo(personaX - 5, personaY - 8);
        ctx.lineTo(personaX + 5, personaY - 8);
        ctx.lineTo(personaX + 5, personaY + 2);

        datos.offsetY = offsetY;
        
        const anchoCanvas = canvas.width;
        const altoCanvas = canvas.height;

        const origenY = offsetY + 250;

        ctx.fillStyle = '#ecf0f1';
        ctx.fillRect(origenX - anchoEscalado * 2, origenY - 100, anchoEscalado * 4, 100);
        
        // Dibujar líneas del triángulo del techo
        if (mostrarTriangulo) {
            // Cateto 1 (altura)
            ctx.strokeStyle = colores.cateto1;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(origenX, origenY - 100);
            ctx.lineTo(origenX, origenY - 100 - alturaEscalada);
            ctx.stroke();
            
            // Cateto 2 (medio ancho)
            ctx.strokeStyle = colores.cateto2;
            ctx.beginPath();
            ctx.moveTo(origenX, origenY - 100);
            ctx.lineTo(origenX + anchoEscalado, origenY - 100);
            ctx.stroke();
            
            // Hipotenusa (techo derecho)
            ctx.strokeStyle = colores.hipotenusa;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(origenX, origenY - 100 - alturaEscalada);
            ctx.lineTo(origenX + anchoEscalado, origenY - 100);
            ctx.stroke();
            
            // Lado izquierdo del techo
            ctx.beginPath();
            ctx.moveTo(origenX, origenY - 100 - alturaEscalada);
            ctx.lineTo(origenX - anchoEscalado, origenY - 100);
            ctx.stroke();
        } else {
            // Techo completo sin resaltar triángulo

            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(origenX - anchoEscalado, origenY - 100);
            ctx.lineTo(origenX, origenY - 100 - alturaEscalada);
            ctx.lineTo(origenX + anchoEscalado, origenY - 100);
            ctx.stroke();
        }
        
        // Dibujar techo (lado delantero)
        ctx.fillStyle = '#e74c3c'; // Rojo teja
        ctx.beginPath();
        ctx.moveTo(origenX - anchoEscalado, origenY - 100);
        ctx.lineTo(origenX, origenY - 100 - alturaEscalada);
        ctx.lineTo(origenX + anchoEscalado, origenY - 100);
        ctx.closePath();
        ctx.fill();
        
        // Dibujar puerta
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(origenX - 15, origenY - 60, 30, 60);
        
        // Dibujar ventanas

        ctx.fillRect(origenX + anchoEscalado * 1.5 - 25, origenY - 80, 25, 25);

            // Techo completo sin resaltar triángulo
            ctx.strokeStyle = colores.elementos;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(origenX - anchoEscalado, origenY - 100);
            ctx.lineTo(origenX, origenY - 100 - alturaEscalada);
            ctx.lineTo(origenX + anchoEscalado, origenY - 100);
            ctx.stroke();
        }
        
        // Dibujar techo (lado delantero)
        ctx.fillStyle = '#e74c3c'; // Rojo teja
        ctx.beginPath();
        ctx.moveTo(origenX - anchoEscalado, origenY - 100);
        ctx.lineTo(origenX, origenY - 100 - alturaEscalada);
        ctx.lineTo(origenX + anchoEscalado, origenY - 100);
        ctx.closePath();
        ctx.fill();
        
        // Dibujar puerta
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(origenX - 15, origenY - 60, 30, 60);
        
        // Dibujar ventanas
        ctx.fillStyle = '#3498db';
        ctx.fillRect(origenX - anchoEscalado * 1.5, origenY - 80, 25, 25);
        ctx.fillRect(origenX + anchoEscalado * 1.5 - 25, origenY - 80, 25, 25);
    }

                        + `<br>(mitad ancho casa)² = ${(datos.longitudTecho * datos.longitudTecho - datos.alturaTecho * datos.alturaTecho).toFixed(1)}`
                },
                {

    // Función para generar un nuevo problema aleatorio
    function generarNuevoProblema() {
        // Restablecer visualización a un solo color
        mostrarTriangulo = false;
        
        const tipoIndice = aleatorio(0, tiposEscenarios.length - 1);
        const tipoEscenario = tiposEscenarios[tipoIndice];
        
        escenarioActual = tipoEscenario;
        datosActuales = tipoEscenario.datos();
        
        // Dibujar el escenario
        tipoEscenario.dibujar(datosActuales);
        
        // Mostrar datos
        mostrarDatos(datosActuales);
        
        // Ocultar modal de solución
        document.getElementById('modal-solucion').style.display = 'none';
    }
    
    // Función para mostrar los datos del problema
    function mostrarDatos(datos) {
        const descripcion = escenarioActual.describir(datos);
        
        document.getElementById('enunciado').innerHTML = descripcion.enunciado;
        document.getElementById('datos').innerHTML = descripcion.datos;
        
        // Actualizar leyenda de colores si se está mostrando el triángulo
        if (mostrarTriangulo) {
            const leyendaContainer = document.getElementById('leyenda-color');
            leyendaContainer.innerHTML = '';
            
            // Añadir leyenda para los catetos e hipotenusa
            const colorItems = [
                { nombre: 'Cateto 1', color: colores.cateto1 },
                { nombre: 'Cateto 2', color: colores.cateto2 },
                { nombre: 'Hipotenusa', color: colores.hipotenusa }
            ];
            
            colorItems.forEach(item => {
                const colorItem = document.createElement('div');
                colorItem.className = 'color-item';
                
                const colorMuestra = document.createElement('div');
                colorMuestra.className = 'color-muestra';
                colorMuestra.style.backgroundColor = item.color;
                
                const colorTexto = document.createElement('span');
                colorTexto.textContent = item.nombre;
                
                colorItem.appendChild(colorMuestra);
                colorItem.appendChild(colorTexto);
                
                leyendaContainer.appendChild(colorItem);
            });
        } else {
            document.getElementById('leyenda-color').innerHTML = '';
        }
    }
    
    // Función para mostrar la solución en una ventana modal
    function mostrarSolucion() {
        const modalSolucion = document.getElementById('modal-solucion');
        const solucionContenido = document.getElementById('solucion');
        
        if (escenarioActual && datosActuales) {
            const resultadoCalculo = escenarioActual.calcular(datosActuales);
            
            // Generar el HTML de la solución
            let solucionHTML = '';
            
            resultadoCalculo.explicacion.forEach(paso => {
                solucionHTML += `
                    <p><strong>${paso.texto}</strong></p>
                    ${paso.formula ? `<p class="formula">${paso.formula}</p>` : ''}
                    <p class="calculo">${paso.calculo}</p>
                `;
            });
            
            // Añadir resultado final
            solucionHTML += `
                <p><strong>Resultado final:</strong></p>
                <p>El valor buscado es: ${resultadoCalculo.valorCalculado} m</p>
            `;
            
            solucionContenido.innerHTML = solucionHTML;
            modalSolucion.style.display = 'block';
        }
    }
    
    // Función para cerrar la ventana modal
    function cerrarModal() {
        document.getElementById('modal-solucion').style.display = 'none';
    }
    
    // Inicialización
    document.addEventListener('DOMContentLoaded', function() {
        // Configurar canvas
        setupCanvas();
        
        // Generar el primer problema
        generarNuevoProblema();
        
        // Eventos de botones
        document.getElementById('nuevo-problema').addEventListener('click', generarNuevoProblema);
        document.getElementById('mostrar-solucion').addEventListener('click', mostrarSolucion);
        document.getElementById('alternar-colores').addEventListener('click', alternarTriangulo);
        document.getElementById('cerrar-modal').addEventListener('click', cerrarModal);
        
        // Cerrar modal al hacer clic fuera del contenido
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('modal-solucion');
            if (event.target === modal) {
                cerrarModal();
            }
        });
        
        // Manejar redimensionamiento
        window.addEventListener('resize', function() {
            setupCanvas();
            if (escenarioActual && datosActuales) {
                escenarioActual.dibujar(datosActuales);
            }
        });
    });
