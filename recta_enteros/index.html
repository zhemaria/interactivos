<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Operaciones con Enteros</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .tablero-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h2 {
            color: var(--primary);
            margin-bottom: 20px;
        }

        .menu-operaciones {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn-op {
            padding: 10px 20px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-op.active, .btn-op:hover {
            background: var(--accent);
            color: white;
        }

        .pizarra {
            background: var(--primary);
            color: white;
            padding: 40px 20px;
            border-radius: 10px;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 2px;
            min-height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .panel-interactivo {
            background: var(--light);
            padding: 20px;
            border-radius: 10px;
            min-height: 150px;
        }

        .fichas-signos {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .ficha {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s, background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ficha:hover {
            transform: scale(1.1);
        }

        .ficha.positiva { background-color: var(--success); }
        .ficha.negativa { background-color: var(--danger); }

        .entrada-numero {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        input[type="number"] {
            padding: 12px;
            font-size: 1.5rem;
            width: 100px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            text-align: center;
        }

        .btn-verificar {
            padding: 12px 25px;
            font-size: 1.2rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .feedback {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 30px;
        }

        .oculto { display: none !important; }
    </style>
</head>
<body>

<div class="tablero-container">
    <h2>Práctica de Enteros: Regla de los Signos</h2>
    
    <div class="menu-operaciones">
        <button class="btn-op active" onclick="cambiarOperacion('suma')">Suma</button>
        <button class="btn-op" onclick="cambiarOperacion('multiplicacion')">Multiplicación</button>
        <button class="btn-op" onclick="cambiarOperacion('division')">División</button>
    </div>

    <div class="pizarra" id="pantalla-problema">
        </div>

    <div class="panel-interactivo">
        <div id="paso-signo">
            <h3>Paso 1: ¿Cuál es el signo del resultado?</h3>
            <div class="fichas-signos">
                <button class="ficha positiva" onclick="verificarSigno(1)">+</button>
                <button class="ficha negativa" onclick="verificarSigno(-1)">-</button>
            </div>
        </div>

        <div id="paso-numero" class="oculto">
            <h3>Paso 2: ¿Cuál es el valor numérico (sin signo)?</h3>
            <div class="entrada-numero">
                <input type="number" id="input-magnitud" min="0" placeholder="0">
                <button class="btn-verificar" onclick="verificarMagnitud()">Comprobar</button>
            </div>
        </div>
    </div>

    <div id="mensaje-feedback" class="feedback"></div>
</div>

<script>
    let operacionActual = 'suma';
    let respuestaCorrecta = 0;
    let signoSeleccionado = 0;

    // Generar número aleatorio entre min y max (excluyendo el cero si es necesario)
    function generarEntero(min, max, excluirCero = true) {
        let num = 0;
        while (num === 0 && excluirCero) {
            num = Math.floor(Math.random() * (max - min + 1)) + min;
        }
        return num;
    }

    // Formatear números negativos con paréntesis para mayor claridad pedagógica
    function formatearNumero(num) {
        return num < 0 ? `(${num})` : num;
    }

    function generarProblema() {
        let num1, num2, textoProblema;

        // Limpiar interfaz
        document.getElementById('paso-signo').classList.remove('oculto');
        document.getElementById('paso-numero').classList.add('oculto');
        document.getElementById('input-magnitud').value = '';
        mostrarMensaje('', '');

        if (operacionActual === 'suma') {
            // Nivel 2: Números entre -20 y 20
            num1 = generarEntero(-20, 20);
            num2 = generarEntero(-20, 20);
            respuestaCorrecta = num1 + num2;
            textoProblema = `${formatearNumero(num1)} + ${formatearNumero(num2)}`;
            
            // Evitar resultados cero en esta práctica de signos para no confundir
            if(respuestaCorrecta === 0) return generarProblema();

        } else if (operacionActual === 'multiplicacion') {
            // Nivel 2: Tablas extendidas (-12 a 12)
            num1 = generarEntero(-12, 12);
            num2 = generarEntero(-12, 12);
            respuestaCorrecta = num1 * num2;
            textoProblema = `${formatearNumero(num1)} &times; ${formatearNumero(num2)}`;

        } else if (operacionActual === 'division') {
            // Nivel 2: Divisiones exactas
            num2 = generarEntero(-12, 12); // Divisor
            let cociente = generarEntero(-12, 12); // Resultado
            num1 = num2 * cociente; // Dividendo
            respuestaCorrecta = cociente;
            textoProblema = `${formatearNumero(num1)} &divide; ${formatearNumero(num2)}`;
        }

        document.getElementById('pantalla-problema').innerHTML = `${textoProblema} = ?`;
    }

    function cambiarOperacion(op) {
        operacionActual = op;
        
        // Actualizar botones visualmente
        document.querySelectorAll('.btn-op').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        generarProblema();
    }

    function verificarSigno(eleccion) {
        let signoCorrecto = Math.sign(respuestaCorrecta);
        
        if (eleccion === signoCorrecto) {
            signoSeleccionado = eleccion;
            mostrarMensaje("¡Excelente! Signo correcto. Ahora, ingresa el valor.", "var(--success)");
            document.getElementById('paso-signo').classList.add('oculto');
            document.getElementById('paso-numero').classList.remove('oculto');
            document.getElementById('input-magnitud').focus();
            
            // Mostrar la primera parte de la respuesta
            let signoTxt = signoSeleccionado === 1 ? "+" : "-";
            let eqActual = document.getElementById('pantalla-problema').innerHTML.split('=')[0];
            document.getElementById('pantalla-problema').innerHTML = `${eqActual} = ${signoTxt} ?`;
        } else {
            mostrarMensaje("Revisa la regla de los signos e inténtalo de nuevo.", "var(--danger)");
        }
    }

    function verificarMagnitud() {
        let input = document.getElementById('input-magnitud').value;
        let magnitudCorrecta = Math.abs(respuestaCorrecta);
        
        if (parseInt(input) === magnitudCorrecta) {
            let eqActual = document.getElementById('pantalla-problema').innerHTML.split('=')[0];
            document.getElementById('pantalla-problema').innerHTML = `${eqActual} = ${respuestaCorrecta}`;
            mostrarMensaje("¡Perfecto! Operación completada correctamente.", "var(--success)");
            
            // Generar nuevo problema después de 2.5 segundos
            setTimeout(() => {
                generarProblema();
            }, 2500);
        } else {
            mostrarMensaje("El valor numérico no es correcto. Intenta de nuevo.", "var(--danger)");
        }
    }

    function mostrarMensaje(texto, color) {
        let msj = document.getElementById('mensaje-feedback');
        msj.textContent = texto;
        msj.style.color = color;
    }

    // Soporte para presionar "Enter" en el input
    document.getElementById('input-magnitud').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            verificarMagnitud();
        }
    });

    // Iniciar con el primer problema
    generarProblema();
</script>

</body>
</html>
