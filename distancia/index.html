<!DOCTYPE html>
<html lang="es">
  <head>
    <!--Creado por Jose M. Fernandez, para uso docente -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Distancias de Illinois</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        max-width: 540px;
        margin: 0 auto;
        overflow-x: hidden;
      }
      .title {
        color: #165385;
        font-size: 14px;
        text-align: center;
        margin: 5px 0;
      }
      .container {
        position: relative;
        width: 540px;
        height: 470px; /* Aumentado un poco la altura */
        border: 2px solid #51b333;
        margin: 0 auto;
        background-color: #f5f5f5;
      }
      #map-image {
        position: absolute;
        width: 520px;
        
        height: 100%;
        top: 0;
        left: 0;
        opacity: 0.4; /* Hacemos la imagen un poco transparente para ver mejor la cuadrícula */
      }
      .point {
        width: 8px;
        height: 8px;
        background-color: red;
        border-radius: 50%;
        position: absolute;
        transform: translate(-50%, -50%);
        z-index: 3;
      }
      .point.selected {
        background-color: blue;
        width: 10px;
        height: 10px;
        border: 2px solid yellow;
      }
      .label {
        color: red;
        font-weight: bold;
        font-size: 10px;
        position: absolute;
        text-align: right;
        z-index: 3;
        white-space: nowrap;
      }
      .star {
        color: red;
        font-size: 20px;
        position: absolute;
        transform: translate(-50%, -50%);
        z-index: 3;
      }
      .button-panel {
        width: 340px;
        margin: 25px auto 10px auto; /* Aumentado el margen superior */
        text-align: center;
      }
      #generateButton {
        background-color: #55b446;
        color: white;
        padding: 10px 20px;
        font-size: 14px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 80%;
        margin: 0 auto;
      }
      .result {
        width: 440px;
        margin: 10px auto;
        padding: 10px;
        background-color: #f4fff0;
        border: 1px solid #5cb446;
        box-sizing: border-box;
        text-align: center;
      }
      .line {
        height: 2px;
        background-color: blue;
        position: absolute;
        transform-origin: 0 0;
        z-index: 2;
      }
      /* Estilos para la cuadrícula y ejes */
      .grid-line {
        position: absolute;
        background-color: rgba(200, 200, 200, 0.5);
        z-index: 1;
      }
      .grid-line.x {
        height: 1px;
        width: 100%;
        left: 0;
      }
      .grid-line.y {
        width: 1px;
        height: 100%;
        top: 0;
      }
      .axis {
        position: absolute;
        background-color: #000;
        z-index: 2;
      }
      .axis.x {
        height: 2px;
        width: 100%;
        bottom: 0; /* Ajustado para que quede en el borde inferior */
        left: 0;
      }
      .axis.y {
        width: 2px;
        height: 100%;
        left: 0;
        top: 0;
      }
      .axis-label {
        position: absolute;
        font-size: 10px;
        color: #000;
        z-index: 2;
      }
      .axis-label.x {
        bottom: -15px; /* Ajustado para que quede justo debajo del eje X */
      }
      .axis-label.y {
        left: 4px;
      }
      .coordinates-display {
        position: absolute;
        bottom: 5px;
        right: 5px;
        background-color: rgba(255, 255, 255, 0.7);
        padding: 2px 5px;
        border-radius: 3px;
        font-size: 10px;
        z-index: 3;
      }
    </style>
  </head>

<script>
  window.onload = function () {
  var mapContainer = document.getElementById("map-container");
  var resultElement = document.getElementById("result");
  var generateButton = document.getElementById("generateButton");
  var distanceLine = null;
  var currentCities = null; // Para guardar las ciudades del ejercicio actual

  var citiesData = [
    { name: "Chicago", x: 430, y: 80 },
    { name: "Rockford", x: 370, y: 35 },
    { name: "Freeport", x: 330, y: 25 },
    { name: "Elgin", x: 425, y: 65 },
    { name: "Naperville", x: 415, y: 100 },
    { name: "Aurora", x: 405, y: 120 },
    { name: "Joliet", x: 425, y: 140 },
    { name: "Chicago Heights", x: 440, y: 160 },
    { name: "Kankakee", x: 430, y: 210 },
    { name: "Pontiac", x: 395, y: 255 },
    { name: "Bloomington", x: 355, y: 330 },
    { name: "Peoria", x: 285, y: 285 },
    { name: "Galesburg", x: 245, y: 235 },
    { name: "Rock Island", x: 185, y: 160 },
    { name: "Kewanee", x: 235, y: 195 },
    { name: "Canton", x: 260, y: 300 },
    { name: "Havana", x: 275, y: 335 },
    { name: "Macomb", x: 205, y: 315 },
    { name: "Quincy", x: 130, y: 380 },
    { name: "Springfield", x: 310, y: 360, isCapital: true },
    { name: "Beardstown", x: 260, y: 350 },
    { name: "Decatur", x: 360, y: 370 },
    { name: "Urbana-Champaigne", x: 410, y: 385 },
    { name: "Charleston", x: 425, y: 400 },
    { name: "Pana", x: 355, y: 415 },
    { name: "Vandalia", x: 390, y: 430 },
    { name: "Centralia", x: 410, y: 440 },
    { name: "East St Louis", x: 200, y: 440 },
    { name: "Alton", x: 150, y: 415 },
  ];

  // Crear cuadrícula y ejes
  createGrid();

  // Crear contenedor para el procedimiento (debajo de la sección de respuesta)
  var procedureSection = document.createElement("div");
  procedureSection.id = "procedure-section";
  procedureSection.style.cssText =
    "width: 540px; margin: 15px auto; padding: 0; display: none;";
  document.body.appendChild(procedureSection);

  // Crear puntos para cada ciudad
  for (var i = 0; i < citiesData.length; i++) {
    var cityData = citiesData[i];

    if (cityData.isCapital) {
      var star = document.createElement("div");
      star.className = "star";
      star.innerHTML = "★";
      star.style.left = cityData.x + "px";
      star.style.top = cityData.y + "px";
      mapContainer.appendChild(star);
    } else {
      var point = document.createElement("div");
      point.className = "point";
      point.id = "city-" + i;
      point.setAttribute("data-city", cityData.name);
      point.style.left = cityData.x + "px";
      point.style.top = cityData.y + "px";
      mapContainer.appendChild(point);
    }

    var label = document.createElement("div");
    label.className = "label";
    label.textContent = cityData.name;
    label.style.left = cityData.x - 5 + "px";
    label.style.top = cityData.y + "px";
    label.style.transform = "translate(-100%, -50%)";
    mapContainer.appendChild(label);
  }

  function createGrid() {
    var gridSize = 50;
    var mapWidth = 540;
    var mapHeight = 450;

    var xAxis = document.createElement("div");
    xAxis.className = "axis x";
    mapContainer.appendChild(xAxis);

    var yAxis = document.createElement("div");
    yAxis.className = "axis y";
    mapContainer.appendChild(yAxis);

    for (var y = 0; y <= mapHeight; y += gridSize) {
      var hLine = document.createElement("div");
      hLine.className = "grid-line x";
      hLine.style.top = y + "px";
      mapContainer.appendChild(hLine);

      if (y > 0) {
        var yLabel = document.createElement("div");
        yLabel.className = "axis-label y";
        yLabel.textContent = y;
        yLabel.style.top = y - 8 + "px";
        mapContainer.appendChild(yLabel);
      }
    }

    for (var x = 0; x <= mapWidth; x += gridSize) {
      var vLine = document.createElement("div");
      vLine.className = "grid-line y";
      vLine.style.left = x + "px";
      mapContainer.appendChild(vLine);

      if (x > 0) {
        var xLabel = document.createElement("div");
        xLabel.className = "axis-label x";
        xLabel.textContent = x;
        xLabel.style.left = x - 8 + "px";
        xLabel.style.bottom = "-15px";
        mapContainer.appendChild(xLabel);
      }
    }

    var originLabel = document.createElement("div");
    originLabel.className = "axis-label";
    originLabel.textContent = "0";
    originLabel.style.left = "4px";
    originLabel.style.bottom = "-15px";
    mapContainer.appendChild(originLabel);
  }

  mapContainer.addEventListener("mousemove", function (e) {
    var rect = mapContainer.getBoundingClientRect();
    var x = Math.round(e.clientX - rect.left);
    var y = Math.round(e.clientY - rect.top);
    x = Math.max(0, Math.min(x, 540));
    y = Math.max(0, Math.min(y, 450));
    document.getElementById("coordinates-display").textContent =
      "X: " + x + ", Y: " + y;
  });

  function drawLine(city1, city2) {
    if (distanceLine) {
      mapContainer.removeChild(distanceLine);
    }
    distanceLine = document.createElement("div");
    distanceLine.className = "line";
    distanceLine.style.left = city1.x + "px";
    distanceLine.style.top = city1.y + "px";
    var dx = city2.x - city1.x;
    var dy = city2.y - city1.y;
    var length = Math.sqrt(dx * dx + dy * dy);
    var angle = (Math.atan2(dy, dx) * 180) / Math.PI;
    distanceLine.style.width = length + "px";
    distanceLine.style.transform = "rotate(" + angle + "deg)";
    mapContainer.appendChild(distanceLine);
  }

  function clearExercise() {
    resultElement.textContent = "";
    document.getElementById("answer-section").style.display = "none";
    document.getElementById("feedback").textContent = "";
    procedureSection.style.display = "none";
    procedureSection.innerHTML = "";

    var cityPoints = document.querySelectorAll(".point");
    for (var i = 0; i < cityPoints.length; i++) {
      cityPoints[i].classList.remove("selected");
    }

    if (distanceLine) {
      mapContainer.removeChild(distanceLine);
      distanceLine = null;
    }
  }

  // Función para mostrar el procedimiento paso a paso
  function showProcedure(city1, city2) {
    var dx = city2.x - city1.x;
    var dy = city2.y - city1.y;
    var dx2 = dx * dx;
    var dy2 = dy * dy;
    var suma = dx2 + dy2;
    var raiz = Math.sqrt(suma);
    var millas = raiz * 0.982;

    var html =
      '<div style="background-color: #f4fff0; border: 2px solid #51b333; border-radius: 6px; padding: 15px; font-family: Arial, sans-serif;">' +
      '<h3 style="color: #165385; margin-top: 0; text-align: center; font-size: 16px;">📐 Procedimiento del cálculo</h3>' +

      '<p style="margin: 8px 0;"><b>Paso 1:</b> Identificamos las coordenadas de cada ciudad.</p>' +
      '<div style="margin-left: 20px; font-family: \'Courier New\', monospace;">' +
      "&nbsp;&nbsp;" + city1.name + ": (x₁, y₁) = (" + city1.x + ", " + city1.y + ")<br>" +
      "&nbsp;&nbsp;" + city2.name + ": (x₂, y₂) = (" + city2.x + ", " + city2.y + ")" +
      "</div>" +

      '<p style="margin: 12px 0 8px 0;"><b>Paso 2:</b> Aplicamos la fórmula de distancia entre dos puntos:</p>' +
      '<div style="text-align: center; font-size: 18px; margin: 8px 0; font-family: \'Courier New\', monospace;">' +
      "d = √[(x₂ − x₁)² + (y₂ − y₁)²]" +
      "</div>" +

      '<p style="margin: 12px 0 8px 0;"><b>Paso 3:</b> Sustituimos los valores y calculamos las diferencias.</p>' +
      '<div style="margin-left: 20px; font-family: \'Courier New\', monospace;">' +
      "&nbsp;&nbsp;x₂ − x₁ = " + city2.x + " − " + city1.x + " = " + dx + "<br>" +
      "&nbsp;&nbsp;y₂ − y₁ = " + city2.y + " − " + city1.y + " = " + dy +
      "</div>" +

      '<p style="margin: 12px 0 8px 0;"><b>Paso 4:</b> Elevamos al cuadrado cada diferencia.</p>' +
      '<div style="margin-left: 20px; font-family: \'Courier New\', monospace;">' +
      "&nbsp;&nbsp;(" + dx + ")² = " + dx2 + "<br>" +
      "&nbsp;&nbsp;(" + dy + ")² = " + dy2 +
      "</div>" +

      '<p style="margin: 12px 0 8px 0;"><b>Paso 5:</b> Sumamos los cuadrados.</p>' +
      '<div style="margin-left: 20px; font-family: \'Courier New\', monospace;">' +
      "&nbsp;&nbsp;" + dx2 + " + " + dy2 + " = " + suma +
      "</div>" +

      '<p style="margin: 12px 0 8px 0;"><b>Paso 6:</b> Calculamos la raíz cuadrada (distancia en píxeles del mapa).</p>' +
      '<div style="margin-left: 20px; font-family: \'Courier New\', monospace;">' +
      "&nbsp;&nbsp;d = √" + suma + " ≈ " + raiz.toFixed(2) + " píxeles" +
      "</div>" +

      '<p style="margin: 12px 0 8px 0;"><b>Paso 7:</b> Convertimos a millas multiplicando por la escala del mapa (≈ 0.982 millas/píxel).</p>' +
      '<div style="margin-left: 20px; font-family: \'Courier New\', monospace;">' +
      "&nbsp;&nbsp;Distancia ≈ " + raiz.toFixed(2) + " × 0.982 ≈ <b style=\"color: #165385;\">" + millas.toFixed(1) + " millas</b>" +
      "</div>" +

      '<p style="margin: 15px 0 5px 0; font-style: italic; color: #555; font-size: 13px; text-align: center;">' +
      "💡 Esta es una distancia en línea recta (a vuelo de pájaro), no por carretera." +
      "</p>" +
      "</div>";

    procedureSection.innerHTML = html;
    procedureSection.style.display = "block";
  }

  generateButton.addEventListener("click", function () {
    clearExercise();

    var idx1 = Math.floor(Math.random() * citiesData.length);
    var idx2;
    do {
      idx2 = Math.floor(Math.random() * citiesData.length);
    } while (idx1 === idx2);

    var city1 = citiesData[idx1];
    var city2 = citiesData[idx2];
    currentCities = { c1: city1, c2: city2 };

    resultElement.textContent =
      "¿Qué distancia hay entre " +
      city1.name + " (" + city1.x + "," + city1.y + ") y " +
      city2.name + " (" + city2.x + "," + city2.y + ")?";

    var cityPoints = document.querySelectorAll(".point");
    for (var i = 0; i < cityPoints.length; i++) {
      var cityName = cityPoints[i].getAttribute("data-city");
      if (cityName === city1.name || cityName === city2.name) {
        cityPoints[i].classList.add("selected");
      }
    }

    drawLine(city1, city2);

    document.getElementById("answer-section").style.display = "block";
    document.getElementById("distance-answer").value = "";
    document.getElementById("feedback").textContent = "";

    var dx = city2.x - city1.x;
    var dy = city2.y - city1.y;
    var distancePixels = Math.sqrt(dx * dx + dy * dy);
    var correctAnswer = (distancePixels * 0.982).toFixed(1);

    document
      .getElementById("check-button")
      .setAttribute("data-correct", correctAnswer);

    // Añadir botón "Ver procedimiento" si no existe
    var answerSection = document.getElementById("answer-section");
    var existingBtn = document.getElementById("show-procedure-btn");
    if (existingBtn) {
      existingBtn.parentNode.removeChild(existingBtn);
    }
    var procBtn = document.createElement("button");
    procBtn.id = "show-procedure-btn";
    procBtn.textContent = "📐 Ver procedimiento del cálculo";
    procBtn.style.cssText =
      "background-color: #165385; color: white; padding: 9px 15px; " +
      "border: none; border-radius: 4px; cursor: pointer; " +
      "display: block; margin: 10px auto;";
    procBtn.addEventListener("click", function () {
      if (procedureSection.style.display === "none" || procedureSection.style.display === "") {
        showProcedure(currentCities.c1, currentCities.c2);
        procBtn.textContent = "🔼 Ocultar procedimiento";
      } else {
        procedureSection.style.display = "none";
        procedureSection.innerHTML = "";
        procBtn.textContent = "📐 Ver procedimiento del cálculo";
      }
    });
    answerSection.appendChild(procBtn);
  });

  document
    .getElementById("check-button")
    .addEventListener("click", function () {
      var studentAnswer = parseFloat(
        document.getElementById("distance-answer").value
      );
      var correctAnswer = parseFloat(this.getAttribute("data-correct"));

      if (isNaN(studentAnswer)) {
        document.getElementById("feedback").textContent =
          "Por favor, introduce un número válido.";
        document.getElementById("feedback").style.color = "red";
        return;
      }

      var errorMargin = correctAnswer * 0.1;
      if (Math.abs(studentAnswer - correctAnswer) <= errorMargin) {
        document.getElementById("feedback").textContent =
          "¡Correcto! La distancia es aproximadamente " + correctAnswer + " millas.";
        document.getElementById("feedback").style.color = "green";
      } else {
        document.getElementById("feedback").textContent =
          "Incorrecto. La distancia es aproximadamente " + correctAnswer + " millas.";
        document.getElementById("feedback").style.color = "red";
      }
    });
};
</script>
  </body>
</html>
