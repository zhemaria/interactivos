<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3-U10-L11: Figuras compuestas — área por suma y resta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
  <style>
    /* ===========================================================
       PALETA Y VARIABLES  (contraste AA verificado)
       =========================================================== */
    :root {
      --tinta:        #1f2733;   /* texto principal              */
      --tinta-suave:  #51607a;   /* texto secundario             */
      --papel:        #f6f7fb;   /* fondo general                */
      --tarjeta:      #ffffff;   /* fondo de tarjetas            */
      --borde:        #d9dee8;   /* bordes suaves                */
      --acento:       #3949ab;   /* índigo principal             */
      --acento-osc:   #2a3690;   /* índigo hover                 */
      --exito:        #1b7a52;   /* verde correcto (AA c/ blanco)*/
      --exito-osc:    #156040;
      --resta:        #b91c1c;   /* rojo de "se resta"           */
      --resta-suave:  #fdeaea;
      --aviso:        #92400e;   /* ámbar oscuro (AA c/ blanco)  */
      --lienzo-bg:    #fbfcfe;
      --sombra:       0 1px 2px rgba(20,30,55,.06), 0 8px 24px rgba(20,30,55,.07);
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Atkinson Hyperlegible", system-ui, sans-serif;
      margin: 0;
      padding: 16px;
      background: var(--papel);
      color: var(--tinta);
      line-height: 1.5;
    }

    .marco {
      max-width: 620px;
      margin: 0 auto;
    }

    .encabezado {
      margin-bottom: 14px;
    }
    .encabezado h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: 1.45rem;
      color: var(--tinta);
      margin: 0 0 4px;
      letter-spacing: -.01em;
    }
    .encabezado p {
      margin: 0;
      color: var(--tinta-suave);
      font-size: .95rem;
    }

    /* ---------- Lienzo ---------- */
    .lienzo-caja {
      position: relative;
      width: 100%;
      height: 320px;
      background:
        radial-gradient(circle at 1px 1px, #e7eaf2 1px, transparent 0) 0 0 / 22px 22px,
        var(--lienzo-bg);
      border: 1px solid var(--borde);
      border-radius: 14px;
      box-shadow: var(--sombra);
      overflow: hidden;
    }
    canvas { width: 100%; height: 100%; display: block; }

    .insignia-op {
      position: absolute;
      top: 12px; left: 12px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 13px;
      border-radius: 999px;
      font-size: .85rem;
      font-weight: 700;
      color: #fff;
      box-shadow: var(--sombra);
    }
    .insignia-op.suma  { background: var(--acento); }
    .insignia-op.resta { background: var(--resta); }

    /* ---------- Tarjeta de datos ---------- */
    .tarjeta {
      background: var(--tarjeta);
      border: 1px solid var(--borde);
      border-radius: 14px;
      box-shadow: var(--sombra);
      padding: 16px 18px;
      margin-top: 14px;
    }
    .titulo-figura {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: 1.12rem;
      margin: 0 0 12px;
      color: var(--tinta);
    }

    .lista-datos {
      display: grid;
      gap: 8px;
      margin: 0 0 4px;
    }
    .dato {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 8px 12px;
      background: #f3f5fa;
      border-radius: 9px;
      border-left: 4px solid var(--acento);
    }
    .dato.parte-resta { border-left-color: var(--resta); background: var(--resta-suave); }
    .dato .etq  { font-weight: 700; min-width: 92px; }
    .dato .val  { color: var(--tinta-suave); }

    .nota {
      margin: 10px 0 0;
      font-size: .9rem;
      color: var(--tinta-suave);
      padding: 9px 12px;
      background: #fff8ec;
      border: 1px dashed #e3c98a;
      border-radius: 9px;
    }

    .leyenda { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
    .leyenda-item { display: flex; align-items: center; gap: 7px; font-size: .9rem; }
    .muestra {
      width: 18px; height: 18px; border-radius: 4px;
      border: 1px solid rgba(0,0,0,.18);
    }
    .muestra.hueco {
      background:
        repeating-linear-gradient(45deg, var(--resta) 0 2px, transparent 2px 5px), #fff;
      border: 2px dashed var(--resta);
    }

    /* ---------- Caja de respuesta ---------- */
    .respuesta {
      margin-top: 14px;
      padding: 16px 18px;
      background: var(--tarjeta);
      border: 1px solid var(--borde);
      border-radius: 14px;
      box-shadow: var(--sombra);
    }
    .respuesta h2 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: 1.05rem;
      margin: 0 0 10px;
    }
    .fila-input {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .fila-input .campo-num {
      flex: 1 1 160px;
      display: flex; align-items: center; gap: 8px;
      border: 2px solid var(--borde);
      border-radius: 10px;
      padding: 4px 12px;
      background: #fff;
      transition: border-color .15s;
    }
    .fila-input .campo-num:focus-within { border-color: var(--acento); }
    .fila-input input {
      border: none; outline: none;
      font-family: inherit; font-size: 1.05rem;
      width: 100%; padding: 8px 0;
      background: transparent; color: var(--tinta);
    }
    .fila-input .unidad { color: var(--tinta-suave); font-size: .95rem; white-space: nowrap; }

    .nota-tol { margin: 8px 0 0; font-size: .82rem; color: var(--tinta-suave); }

    .feedback {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: .95rem;
      display: none;
    }
    .feedback.ok    { display: block; background: #e8f6ee; border: 1px solid #b6e0c6; color: #11502f; }
    .feedback.casi  { display: block; background: #fff5e0; border: 1px solid #ecd28c; color: var(--aviso); }
    .feedback.error { display: block; background: var(--resta-suave); border: 1px solid #f2c0c0; color: #8a1515; }
    .feedback strong { font-weight: 700; }

    .marcador {
      margin-top: 10px; font-size: .85rem; color: var(--tinta-suave);
      display: flex; gap: 16px;
    }
    .marcador b { color: var(--tinta); }

    /* ---------- Botones ---------- */
    .controles { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    button {
      font-family: inherit; font-size: .95rem; font-weight: 700;
      padding: 11px 18px; border-radius: 10px; cursor: pointer;
      border: 2px solid transparent; transition: all .15s;
    }
    .btn-primario   { background: var(--exito); color: #fff; }
    .btn-primario:hover   { background: #156040; }
    .btn-secundario { background: var(--acento); color: #fff; }
    .btn-secundario:hover { background: var(--acento-osc); }
    .btn-fantasma   { background: #fff; color: var(--acento); border-color: var(--acento); }
    .btn-fantasma:hover   { background: #eef0fb; }
    button:focus-visible { outline: 3px solid #c3cbf2; outline-offset: 2px; }

    /* ---------- Modal solución ---------- */
    .modal {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(20,28,48,.55);
      backdrop-filter: blur(2px);
      padding: 18px;
    }
    .modal.abierto { display: flex; align-items: center; justify-content: center; }
    .modal-caja {
      background: #fff; border-radius: 16px; padding: 22px 24px;
      width: 100%; max-width: 520px; max-height: 86vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(15,22,45,.35); position: relative;
    }
    .modal-caja h3 {
      font-family: "Fraunces", Georgia, serif; font-weight: 600;
      color: var(--exito); margin: 0 0 14px; padding-right: 34px; font-size: 1.2rem;
    }
    .cerrar {
      position: absolute; top: 12px; right: 16px;
      font-size: 26px; line-height: 1; font-weight: 700; cursor: pointer; color: #98a2b6;
      background: none; border: none; padding: 0;
    }
    .cerrar:hover { color: var(--tinta); }
    .paso { margin: 0 0 16px; }
    .paso .txt { font-weight: 700; margin: 0 0 4px; }
    .paso .formula { font-style: italic; color: var(--tinta-suave); margin: 0 0 3px; }
    .paso .calculo { margin: 0; font-variant-numeric: tabular-nums; }
    .resultado-final {
      margin-top: 6px; padding: 13px 15px; border-radius: 11px;
      background: #e8f6ee; border: 1px solid #b6e0c6; color: #11502f; font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="marco">

    <div class="encabezado">
      <h1>Figuras compuestas</h1>
      <p>Observa cómo se combinan las figuras, calcula el <strong>área total</strong> y comprueba tu respuesta.</p>
    </div>

    <div class="lienzo-caja">
      <span class="insignia-op" id="insignia-op"></span>
      <canvas id="lienzo"></canvas>
    </div>

    <div class="tarjeta">
      <h2 class="titulo-figura" id="titulo-figura"></h2>
      <div class="lista-datos" id="lista-datos"></div>
      <div class="nota" id="nota" style="display:none;"></div>
      <div class="leyenda" id="leyenda" style="display:none;"></div>
    </div>

    <div class="respuesta">
      <h2>Tu respuesta</h2>
      <div class="fila-input">
        <div class="campo-num">
          <input type="text" inputmode="decimal" id="entrada"
                 aria-label="Escribe el área total que calculaste"
                 placeholder="Escribe el área total">
          <span class="unidad">unidades²</span>
        </div>
        <button class="btn-primario" id="comprobar">Comprobar</button>
      </div>
      <p class="nota-tol">Usa <strong>π = 3,14</strong>. Se aceptan pequeñas diferencias por redondeo.</p>
      <div class="feedback" id="feedback"></div>
      <div class="marcador">
        <span>Aciertos: <b id="aciertos">0</b></span>
        <span>Intentos: <b id="intentos">0</b></span>
      </div>
    </div>

    <div class="controles">
      <button class="btn-secundario" id="nueva">Nueva figura</button>
      <button class="btn-fantasma"  id="ver-solucion">Ver solución</button>
      <button class="btn-fantasma"  id="alternar">Distinguir las partes</button>
    </div>

    <div class="modal" id="modal">
      <div class="modal-caja">
        <button class="cerrar" id="cerrar" aria-label="Cerrar">&times;</button>
        <h3>Solución paso a paso</h3>
        <div id="solucion"></div>
      </div>
    </div>

  </div>

<script>
/* ===================================================================
   INTERACTIVO DE FIGURAS COMPUESTAS  ·  Nivel 3 · U10-L11
   Objetivo didáctico: que el estudiante VEA cómo se combinan las
   figuras (suma o resta), calcule el área total y la compruebe.

   Convenios visuales:
     - Lo que se SUMA  -> relleno sólido, unido a la figura base.
     - Lo que se RESTA -> hueco (blanco + rayado + borde rojo punteado),
                          para que nunca se confunda con una suma.
   =================================================================== */

"use strict";

const PI = 3.14;

/* ---------- Lienzo y contexto ---------- */
const canvas = document.getElementById("lienzo");
const ctx = canvas.getContext("2d");
let anchoLogico = 0, altoLogico = 0;

/* ---------- Estado ---------- */
let figuraActual = null;
let datosActuales = null;
let modoColores = false;          // false = un solo color; true = distinguir partes
let aciertos = 0, intentos = 0;
let yaAcerto = false;             // evita contar el mismo problema dos veces

/* ---------- Paleta de relleno para "distinguir partes" ---------- */
const COLOR_UNICO  = "#4f57c4";   // color base cuando NO se distinguen partes
const COLORES = [
  "#3949ab", "#0d8a72", "#b45309", "#9333ea", "#0e7490", "#be185d"
];

/* ===================================================================
   UTILIDADES
   =================================================================== */
function aleatorio(min, max) {
  min = Math.ceil(min); max = Math.floor(max);
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Formatea números: enteros sin decimales; con decimales hasta 2 cifras.
function fmt(n) {
  const r = Math.round(n * 100) / 100;
  return Number.isInteger(r) ? String(r) : r.toFixed(2);
}

function dosColores() {
  const a = COLORES[aleatorio(0, COLORES.length - 1)];
  let b = a;
  while (b === a) b = COLORES[aleatorio(0, COLORES.length - 1)];
  return [a, b];
}

/* ===================================================================
   AYUDANTES DE DIBUJO
   `trazar` es una función que define el contorno (beginPath..closePath).
   =================================================================== */
function pintarSolido(trazar, color) {
  trazar();
  ctx.fillStyle = color;
  ctx.fill();
  trazar();
  ctx.lineWidth = 2;
  ctx.strokeStyle = "rgba(0,0,0,.30)";   // borde oscuro uniforme
  ctx.stroke();
}

function pintarHueco(trazar, tinte) {
  // 1) Relleno blanco (la región "desaparece")
  trazar();
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  // 2) Rayado diagonal recortado a la región
  ctx.save();
  trazar();
  ctx.clip();
  ctx.strokeStyle = tinte || "#d98a8a";
  ctx.lineWidth = 1.5;
  const paso = 9;
  for (let x = -altoLogico; x < anchoLogico; x += paso) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x + altoLogico, altoLogico);
    ctx.stroke();
  }
  ctx.restore();
  // 3) Borde rojo discontinuo = "esto se quita"
  trazar();
  ctx.setLineDash([7, 4]);
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = "#b91c1c";
  ctx.stroke();
  ctx.setLineDash([]);
}

// Rótulo de dimensión sobre la figura.
function rotular(x, y, texto, alineacion) {
  ctx.font = "600 13px 'Atkinson Hyperlegible', sans-serif";
  ctx.fillStyle = "#1f2733";
  ctx.textAlign = alineacion || "center";
  ctx.textBaseline = "middle";
  // halo blanco para legibilidad sobre cualquier color
  ctx.save();
  ctx.lineWidth = 4;
  ctx.strokeStyle = "rgba(255,255,255,.92)";
  ctx.strokeText(texto, x, y);
  ctx.restore();
  ctx.fillText(texto, x, y);
}

/* ===================================================================
   DEFINICIÓN DE LAS FIGURAS
   Cada figura expone:
     nombre, operacion ('suma'|'resta'),
     generar()  -> objeto de datos
     areas(d)   -> { base, parte }   (áreas de los componentes)
     dibujar(d) -> pinta en el lienzo
     pasos(d)   -> arreglo de pasos para la solución
   =================================================================== */
const FIGURAS = [

  /* 1 ── Rectángulo + semicírculo (arco arriba) ───────────────── */
  {
    nombre: "Rectángulo con semicírculo",
    operacion: "suma",
    generar() {
      const ancho = aleatorio(70, 150);
      const alto  = aleatorio(45, 95);
      const [cb, cp] = dosColores();
      return { ancho, alto, radio: ancho / 2, colorBase: cb, colorParte: cp,
               etqBase: "Rectángulo", etqParte: "Semicírculo" };
    },
    areas(d) {
      return { base: d.ancho * d.alto, parte: (PI * d.radio * d.radio) / 2 };
    },
    dibujar(d) {
      const { ox, oy } = centrar(d.ancho, d.radio + d.alto);
      const cBase  = modoColores ? d.colorBase  : COLOR_UNICO;
      const cParte = modoColores ? d.colorParte : COLOR_UNICO;
      const yRect = oy + d.radio;
      pintarSolido(() => { ctx.beginPath();
        ctx.rect(ox, yRect, d.ancho, d.alto); }, cBase);
      pintarSolido(() => { ctx.beginPath();
        ctx.arc(ox + d.ancho / 2, yRect, d.radio, Math.PI, 2 * Math.PI);
        ctx.closePath(); }, cParte);
      rotular(ox + d.ancho / 2, yRect + d.alto + 14, d.ancho + " u");
      rotular(ox + d.ancho + 16, yRect + d.alto / 2, d.alto + " u", "left");
      rotular(ox + d.ancho / 2, oy + d.radio / 2 - 2, "r = " + d.radio + " u");
    },
    pasos(d) {
      const a = this.areas(d);
      return [
        { txt: "Paso 1 — Área del rectángulo", formula: "A = base × altura",
          calculo: "A = " + d.ancho + " × " + d.alto + " = " + fmt(a.base) + " u²" },
        { txt: "Paso 2 — Área del semicírculo", formula: "A = (π × r²) ÷ 2",
          calculo: "A = (" + PI + " × " + d.radio + "²) ÷ 2 = " + fmt(a.parte) + " u²" },
        { txt: "Paso 3 — Sumamos las dos áreas", formula: "A total = rectángulo + semicírculo",
          calculo: "A total = " + fmt(a.base) + " + " + fmt(a.parte) + " = " + fmt(a.base + a.parte) + " u²" }
      ];
    }
  },

  /* 2 ── Rectángulo + semicírculo lateral ─────────────────────── */
  {
    nombre: "Rectángulo con semicírculo lateral",
    operacion: "suma",
    generar() {
      const ancho = aleatorio(70, 130);
      const alto  = aleatorio(50, 100);
      const [cb, cp] = dosColores();
      return { ancho, alto, radio: alto / 2, colorBase: cb, colorParte: cp,
               etqBase: "Rectángulo", etqParte: "Semicírculo" };
    },
    areas(d) {
      return { base: d.ancho * d.alto, parte: (PI * d.radio * d.radio) / 2 };
    },
    dibujar(d) {
      const { ox, oy } = centrar(d.ancho + d.radio, d.alto);
      const cBase  = modoColores ? d.colorBase  : COLOR_UNICO;
      const cParte = modoColores ? d.colorParte : COLOR_UNICO;
      pintarSolido(() => { ctx.beginPath();
        ctx.rect(ox, oy, d.ancho, d.alto); }, cBase);
      pintarSolido(() => { ctx.beginPath();
        ctx.arc(ox + d.ancho, oy + d.alto / 2, d.radio, -Math.PI / 2, Math.PI / 2);
        ctx.closePath(); }, cParte);
      rotular(ox + d.ancho / 2, oy + d.alto + 14, d.ancho + " u");
      rotular(ox - 14, oy + d.alto / 2, d.alto + " u", "right");
      rotular(ox + d.ancho + d.radio / 2, oy + d.alto / 2, "r=" + d.radio);
    },
    pasos(d) {
      const a = this.areas(d);
      return [
        { txt: "Paso 1 — Área del rectángulo", formula: "A = base × altura",
          calculo: "A = " + d.ancho + " × " + d.alto + " = " + fmt(a.base) + " u²" },
        { txt: "Paso 2 — Área del semicírculo", formula: "A = (π × r²) ÷ 2",
          calculo: "A = (" + PI + " × " + d.radio + "²) ÷ 2 = " + fmt(a.parte) + " u²" },
        { txt: "Paso 3 — Sumamos las dos áreas", formula: "A total = rectángulo + semicírculo",
          calculo: "A total = " + fmt(a.base) + " + " + fmt(a.parte) + " = " + fmt(a.base + a.parte) + " u²" }
      ];
    }
  },

  /* 3 ── Trapecio + triángulo (casa) ──────────────────────────── */
  {
    nombre: "Trapecio con triángulo",
    operacion: "suma",
    generar() {
      const baseMayor = aleatorio(90, 150);
      const baseMenor = aleatorio(45, baseMayor - 25);
      const altTrap   = aleatorio(45, 85);
      const altTri    = aleatorio(35, 70);
      const [cb, cp] = dosColores();
      return { baseMayor, baseMenor, altTrap, altTri, colorBase: cb, colorParte: cp,
               etqBase: "Trapecio", etqParte: "Triángulo" };
    },
    areas(d) {
      return {
        base:  ((d.baseMayor + d.baseMenor) / 2) * d.altTrap,
        parte: 0.5 * d.baseMenor * d.altTri          // el triángulo apoya en la base menor
      };
    },
    dibujar(d) {
      const { ox, oy } = centrar(d.baseMayor, d.altTri + d.altTrap);
      const cBase  = modoColores ? d.colorBase  : COLOR_UNICO;
      const cParte = modoColores ? d.colorParte : COLOR_UNICO;
      const dif = (d.baseMayor - d.baseMenor) / 2;
      const yTop = oy + d.altTri;                    // unión trapecio/triángulo
      const yBot = oy + d.altTri + d.altTrap;
      pintarSolido(() => { ctx.beginPath();
        ctx.moveTo(ox, yBot);
        ctx.lineTo(ox + d.baseMayor, yBot);
        ctx.lineTo(ox + d.baseMayor - dif, yTop);
        ctx.lineTo(ox + dif, yTop);
        ctx.closePath(); }, cBase);
      pintarSolido(() => { ctx.beginPath();
        ctx.moveTo(ox + d.baseMayor / 2, oy);
        ctx.lineTo(ox + dif, yTop);
        ctx.lineTo(ox + d.baseMayor - dif, yTop);
        ctx.closePath(); }, cParte);
      rotular(ox + d.baseMayor / 2, yBot + 14, "B = " + d.baseMayor + " u");
      rotular(ox + d.baseMayor / 2, yTop - 13, "b = " + d.baseMenor + " u");
      rotular(ox - 12, (yTop + yBot) / 2, d.altTrap + " u", "right");
      rotular(ox + d.baseMayor - dif + 14, oy + d.altTri / 2, "h=" + d.altTri, "left");
    },
    pasos(d) {
      const a = this.areas(d);
      return [
        { txt: "Paso 1 — Área del trapecio", formula: "A = ((B + b) ÷ 2) × altura",
          calculo: "A = ((" + d.baseMayor + " + " + d.baseMenor + ") ÷ 2) × " + d.altTrap + " = " + fmt(a.base) + " u²" },
        { txt: "Paso 2 — Área del triángulo", formula: "A = (base × altura) ÷ 2",
          calculo: "A = (" + d.baseMenor + " × " + d.altTri + ") ÷ 2 = " + fmt(a.parte) + " u²" },
        { txt: "Paso 3 — Sumamos las dos áreas", formula: "A total = trapecio + triángulo",
          calculo: "A total = " + fmt(a.base) + " + " + fmt(a.parte) + " = " + fmt(a.base + a.parte) + " u²" }
      ];
    }
  },

  /* 4 ── Cuadrado − círculo (orificio central) ────────────────── */
  {
    nombre: "Cuadrado con orificio circular",
    operacion: "resta",
    generar() {
      const lado  = aleatorio(95, 150);
      const radio = aleatorio(20, Math.floor(lado / 2) - 8);
      const [cb, cp] = dosColores();
      return { lado, radio, colorBase: cb, colorParte: cp,
               etqBase: "Cuadrado", etqParte: "Círculo" };
    },
    areas(d) {
      return { base: d.lado * d.lado, parte: PI * d.radio * d.radio };
    },
    dibujar(d) {
      const { ox, oy } = centrar(d.lado, d.lado);
      const cBase = modoColores ? d.colorBase : COLOR_UNICO;
      const tinte = modoColores ? d.colorParte : null;
      pintarSolido(() => { ctx.beginPath();
        ctx.rect(ox, oy, d.lado, d.lado); }, cBase);
      pintarHueco(() => { ctx.beginPath();
        ctx.arc(ox + d.lado / 2, oy + d.lado / 2, d.radio, 0, 2 * Math.PI); }, tinte);
      rotular(ox + d.lado / 2, oy + d.lado + 14, d.lado + " u");
      rotular(ox + d.lado / 2, oy + d.lado / 2 + d.radio + 13, "r = " + d.radio + " u");
    },
    pasos(d) {
      const a = this.areas(d);
      return [
        { txt: "Paso 1 — Área del cuadrado", formula: "A = lado × lado",
          calculo: "A = " + d.lado + " × " + d.lado + " = " + fmt(a.base) + " u²" },
        { txt: "Paso 2 — Área del círculo (se quita)", formula: "A = π × r²",
          calculo: "A = " + PI + " × " + d.radio + "² = " + fmt(a.parte) + " u²" },
        { txt: "Paso 3 — Restamos el círculo del cuadrado", formula: "A total = cuadrado − círculo",
          calculo: "A total = " + fmt(a.base) + " − " + fmt(a.parte) + " = " + fmt(a.base - a.parte) + " u²" }
      ];
    }
  },

  /* 5 ── Cuadrado − triángulo (esquina recortada) ─────────────── */
  {
    nombre: "Cuadrado con esquina recortada",
    operacion: "resta",
    generar() {
      const lado   = aleatorio(95, 150);
      const base   = aleatorio(35, lado - 15);
      const altura = aleatorio(35, lado - 15);
      const [cb, cp] = dosColores();
      return { lado, base, altura, colorBase: cb, colorParte: cp,
               etqBase: "Cuadrado", etqParte: "Triángulo" };
    },
    areas(d) {
      return { base: d.lado * d.lado, parte: 0.5 * d.base * d.altura };
    },
    dibujar(d) {
      const { ox, oy } = centrar(d.lado, d.lado);
      const cBase = modoColores ? d.colorBase : COLOR_UNICO;
      const tinte = modoColores ? d.colorParte : null;
      // El cuadrado sólido; se recorta el triángulo de la esquina superior derecha.
      pintarSolido(() => { ctx.beginPath();
        ctx.rect(ox, oy, d.lado, d.lado); }, cBase);
      pintarHueco(() => { ctx.beginPath();
        ctx.moveTo(ox + d.lado - d.base, oy);
        ctx.lineTo(ox + d.lado, oy);
        ctx.lineTo(ox + d.lado, oy + d.altura);
        ctx.closePath(); }, tinte);
      rotular(ox + d.lado / 2, oy + d.lado + 14, "lado = " + d.lado + " u");
      rotular(ox + d.lado - d.base / 2, oy - 12, "b = " + d.base);
      rotular(ox + d.lado + 12, oy + d.altura / 2, "h=" + d.altura, "left");
    },
    pasos(d) {
      const a = this.areas(d);
      return [
        { txt: "Paso 1 — Área del cuadrado", formula: "A = lado × lado",
          calculo: "A = " + d.lado + " × " + d.lado + " = " + fmt(a.base) + " u²" },
        { txt: "Paso 2 — Área del triángulo (se quita)", formula: "A = (base × altura) ÷ 2",
          calculo: "A = (" + d.base + " × " + d.altura + ") ÷ 2 = " + fmt(a.parte) + " u²" },
        { txt: "Paso 3 — Restamos el triángulo del cuadrado", formula: "A total = cuadrado − triángulo",
          calculo: "A total = " + fmt(a.base) + " − " + fmt(a.parte) + " = " + fmt(a.base - a.parte) + " u²" }
      ];
    }
  },

  /* 6 ── Círculo − segmento circular ──────────────────────────── */
  {
    nombre: "Círculo con segmento recortado",
    operacion: "resta",
    generar() {
      const radio  = aleatorio(75, 120);
      const altura = aleatorio(Math.floor(radio / 3), Math.floor((radio * 2) / 3));
      const [cb, cp] = dosColores();
      return { radio, altura, colorBase: cb, colorParte: cp,
               etqBase: "Círculo", etqParte: "Segmento" };
    },
    geometria(d) {
      const r = d.radio, h = d.altura;
      const cuerda = 2 * Math.sqrt(2 * r * h - h * h);
      const mitad  = Math.asin(Math.min(1, cuerda / (2 * r)));
      const angulo = 2 * mitad;
      const areaSector    = (angulo / (2 * Math.PI)) * (PI * r * r);
      const areaTriangulo = 0.5 * cuerda * (r - h);
      return { cuerda, mitad, areaSector, areaTriangulo,
               areaSegmento: areaSector - areaTriangulo };
    },
    areas(d) {
      return { base: PI * d.radio * d.radio, parte: this.geometria(d).areaSegmento };
    },
    dibujar(d) {
      const { ox, oy } = centrar(2 * d.radio, 2 * d.radio);
      const cx = ox + d.radio, cy = oy + d.radio;
      const g = this.geometria(d);
      const cBase = modoColores ? d.colorBase : COLOR_UNICO;
      const tinte = modoColores ? d.colorParte : null;
      pintarSolido(() => { ctx.beginPath();
        ctx.arc(cx, cy, d.radio, 0, 2 * Math.PI); }, cBase);
      // Segmento inferior recortado
      pintarHueco(() => { ctx.beginPath();
        ctx.arc(cx, cy, d.radio, Math.PI / 2 - g.mitad, Math.PI / 2 + g.mitad);
        ctx.closePath(); }, tinte);
      rotular(cx, cy, "r = " + d.radio + " u");
      rotular(cx + d.radio + 8, cy + d.radio - d.altura / 2, "h=" + d.altura, "left");
    },
    pasos(d) {
      const a = this.areas(d);
      const g = this.geometria(d);
      return [
        { txt: "Paso 1 — Área del círculo completo", formula: "A = π × r²",
          calculo: "A = " + PI + " × " + d.radio + "² = " + fmt(a.base) + " u²" },
        { txt: "Paso 2 — Área del segmento (se quita)", formula: "A = área del sector − área del triángulo",
          calculo: "A = " + fmt(g.areaSector) + " − " + fmt(g.areaTriangulo) + " = " + fmt(a.parte) + " u²" },
        { txt: "Paso 3 — Restamos el segmento del círculo", formula: "A total = círculo − segmento",
          calculo: "A total = " + fmt(a.base) + " − " + fmt(a.parte) + " = " + fmt(a.base - a.parte) + " u²" }
      ];
    }
  }
];

/* ===================================================================
   CÁLCULO CENTRAL DE ÁREAS  (una sola fuente de verdad)
   =================================================================== */
function calcularAreas(figura, d) {
  const { base, parte } = figura.areas(d);
  const esSuma = figura.operacion === "suma";
  return {
    base, parte,
    total:  esSuma ? base + parte : base - parte,
    trampa: esSuma ? base - parte : base + parte   // el error típico (operación inversa)
  };
}

/* ===================================================================
   CENTRAR LA FIGURA EN EL LIENZO
   =================================================================== */
function centrar(ancho, alto) {
  return {
    ox: (anchoLogico - ancho) / 2,
    oy: (altoLogico - alto) / 2
  };
}

/* ===================================================================
   CONFIGURAR LIENZO NÍTIDO (alta resolución)
   =================================================================== */
function configurarLienzo() {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  anchoLogico = rect.width;
  altoLogico  = rect.height;
  canvas.width  = Math.round(rect.width  * dpr);
  canvas.height = Math.round(rect.height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

/* ===================================================================
   DIBUJAR LA FIGURA ACTUAL
   =================================================================== */
function redibujar() {
  if (!figuraActual || !datosActuales) return;
  ctx.clearRect(0, 0, anchoLogico, altoLogico);
  figuraActual.dibujar(datosActuales);
}

/* ===================================================================
   MOSTRAR LOS DATOS EN LA TARJETA
   =================================================================== */
function mostrarDatos() {
  const d = datosActuales, f = figuraActual;
  const esSuma = f.operacion === "suma";

  // Insignia de operación
  const insignia = document.getElementById("insignia-op");
  insignia.className = "insignia-op " + (esSuma ? "suma" : "resta");
  insignia.textContent = (esSuma ? "➕  Suma de áreas" : "➖  Resta de áreas");

  // Título
  document.getElementById("titulo-figura").textContent = f.nombre;

  // Lista de dimensiones
  const lista = document.getElementById("lista-datos");
  lista.innerHTML = "";
  const filas = construirFilas(f, d);
  filas.forEach(fila => {
    const div = document.createElement("div");
    div.className = "dato" + (fila.resta ? " parte-resta" : "");
    div.innerHTML = '<span class="etq">' + fila.etq + '</span>' +
                    '<span class="val">' + fila.val + '</span>';
    lista.appendChild(div);
  });

  // Nota para las restas
  const nota = document.getElementById("nota");
  if (esSuma) {
    nota.style.display = "none";
  } else {
    nota.style.display = "block";
    nota.innerHTML = "La zona <strong>rayada con borde rojo</strong> se " +
                     "<strong>resta</strong>: no forma parte del área final.";
  }

  // Leyenda (solo cuando se distinguen las partes)
  const leyenda = document.getElementById("leyenda");
  if (modoColores) {
    leyenda.style.display = "flex";
    leyenda.innerHTML = "";
    leyenda.appendChild(itemLeyenda(d.etqBase, d.colorBase, false));
    leyenda.appendChild(itemLeyenda(
      d.etqParte + (esSuma ? "" : " (se resta)"),
      d.colorParte, !esSuma));
  } else {
    leyenda.style.display = "none";
  }
}

function construirFilas(f, d) {
  switch (f.nombre) {
    case "Rectángulo con semicírculo":
    case "Rectángulo con semicírculo lateral":
      return [
        { etq: "Rectángulo", val: "ancho = " + d.ancho + " u · altura = " + d.alto + " u" },
        { etq: "Semicírculo", val: "radio = " + d.radio + " u" }
      ];
    case "Trapecio con triángulo":
      return [
        { etq: "Trapecio", val: "base mayor = " + d.baseMayor + " u · base menor = " +
                                 d.baseMenor + " u · altura = " + d.altTrap + " u" },
        { etq: "Triángulo", val: "base = " + d.baseMenor + " u · altura = " + d.altTri + " u" }
      ];
    case "Cuadrado con orificio circular":
      return [
        { etq: "Cuadrado", val: "lado = " + d.lado + " u" },
        { etq: "Círculo", val: "radio = " + d.radio + " u", resta: true }
      ];
    case "Cuadrado con esquina recortada":
      return [
        { etq: "Cuadrado", val: "lado = " + d.lado + " u" },
        { etq: "Triángulo", val: "base = " + d.base + " u · altura = " + d.altura + " u", resta: true }
      ];
    case "Círculo con segmento recortado":
      return [
        { etq: "Círculo", val: "radio = " + d.radio + " u" },
        { etq: "Segmento", val: "altura = " + d.altura + " u", resta: true }
      ];
    default:
      return [];
  }
}

function itemLeyenda(texto, color, hueco) {
  const item = document.createElement("div");
  item.className = "leyenda-item";
  const m = document.createElement("span");
  m.className = "muestra" + (hueco ? " hueco" : "");
  if (!hueco) m.style.backgroundColor = color;
  const t = document.createElement("span");
  t.textContent = texto;
  item.appendChild(m); item.appendChild(t);
  return item;
}

/* ===================================================================
   GENERAR NUEVA FIGURA
   =================================================================== */
function nuevaFigura() {
  figuraActual = FIGURAS[aleatorio(0, FIGURAS.length - 1)];
  datosActuales = figuraActual.generar();
  yaAcerto = false;

  redibujar();
  mostrarDatos();

  // Reiniciar caja de respuesta
  document.getElementById("entrada").value = "";
  const fb = document.getElementById("feedback");
  fb.className = "feedback";
  fb.innerHTML = "";
  document.getElementById("modal").classList.remove("abierto");
  document.getElementById("entrada").focus();
}

/* ===================================================================
   COMPROBAR LA RESPUESTA  (retroalimentación inteligente)
   =================================================================== */
function comprobar() {
  const entrada = document.getElementById("entrada");
  const fb = document.getElementById("feedback");
  const texto = entrada.value.trim().replace(",", ".");

  if (texto === "" || isNaN(Number(texto))) {
    fb.className = "feedback casi";
    fb.innerHTML = "Escribe un número en el cuadro antes de comprobar.";
    return;
  }

  const resp = Number(texto);
  const A = calcularAreas(figuraActual, datosActuales);
  const tol = Math.max(1.5, A.total * 0.01);   // tolerancia por redondeo

  intentos++;
  document.getElementById("intentos").textContent = intentos;

  const cerca = (objetivo) => Math.abs(resp - objetivo) <= tol;
  const esSuma = figuraActual.operacion === "suma";

  if (cerca(A.total)) {
    if (!yaAcerto) { aciertos++; yaAcerto = true;
      document.getElementById("aciertos").textContent = aciertos; }
    fb.className = "feedback ok";
    fb.innerHTML = "<strong>¡Correcto!</strong> El área total es " +
                   fmt(A.total) + " u².";
  } else if (cerca(A.trampa)) {
    // El error clásico: usar la operación inversa.
    fb.className = "feedback casi";
    fb.innerHTML = "<strong>Casi.</strong> Parece que " +
      (esSuma ? "<strong>restaste</strong> las áreas, pero aquí se <strong>suman</strong>"
              : "<strong>sumaste</strong> las áreas, pero aquí la figura interior se <strong>resta</strong>") +
      ". Mira la insignia de la operación y vuelve a intentarlo.";
  } else if (cerca(A.base)) {
    fb.className = "feedback casi";
    fb.innerHTML = "<strong>Casi.</strong> Ese es el área de <strong>una sola</strong> figura. " +
      "Falta combinarla con la otra parte.";
  } else if (cerca(A.parte)) {
    fb.className = "feedback casi";
    fb.innerHTML = "<strong>Casi.</strong> Ese es el área de la figura que se " +
      (esSuma ? "suma" : "resta") + ", no el área total.";
  } else {
    fb.className = "feedback error";
    fb.innerHTML = "<strong>Aún no.</strong> Revisa cada figura por separado y luego " +
      (esSuma ? "súmalas" : "réstalas") + ". Pulsa «Ver solución» si necesitas la guía.";
  }
}

/* ===================================================================
   MOSTRAR SOLUCIÓN (modal)
   =================================================================== */
function verSolucion() {
  const A = calcularAreas(figuraActual, datosActuales);
  const pasos = figuraActual.pasos(datosActuales);
  let html = "";
  pasos.forEach(p => {
    html += '<div class="paso">' +
              '<p class="txt">' + p.txt + '</p>' +
              '<p class="formula">' + p.formula + '</p>' +
              '<p class="calculo">' + p.calculo + '</p>' +
            '</div>';
  });
  html += '<div class="resultado-final">Área total = ' + fmt(A.total) + ' unidades²</div>';
  document.getElementById("solucion").innerHTML = html;
  document.getElementById("modal").classList.add("abierto");
}

function cerrarModal() {
  document.getElementById("modal").classList.remove("abierto");
}

/* ===================================================================
   ALTERNAR ENTRE UN COLOR Y DISTINGUIR LAS PARTES
   =================================================================== */
function alternarColores() {
  modoColores = !modoColores;
  document.getElementById("alternar").textContent =
    modoColores ? "Ver como una figura" : "Distinguir las partes";
  redibujar();
  mostrarDatos();
}

/* ===================================================================
   INICIALIZACIÓN
   =================================================================== */
document.addEventListener("DOMContentLoaded", function () {
  configurarLienzo();
  nuevaFigura();

  document.getElementById("nueva").addEventListener("click", nuevaFigura);
  document.getElementById("comprobar").addEventListener("click", comprobar);
  document.getElementById("ver-solucion").addEventListener("click", verSolucion);
  document.getElementById("alternar").addEventListener("click", alternarColores);
  document.getElementById("cerrar").addEventListener("click", cerrarModal);

  document.getElementById("entrada").addEventListener("keydown", function (e) {
    if (e.key === "Enter") comprobar();
  });

  document.getElementById("modal").addEventListener("click", function (e) {
    if (e.target === this) cerrarModal();
  });

  window.addEventListener("resize", function () {
    configurarLienzo();
    redibujar();
  });
});
</script>
